name: Integration

on:
  workflow_dispatch:    # Manual trigger from Actions tab
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC (= 14:00 Asia/Shanghai)

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Only run if secret is present (avoid 401 from empty key).
    # Always allow manual workflow_dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          CODING_AGENT_TESTING: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_integration_all_tools.py -q
